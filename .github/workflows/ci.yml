name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,similarity]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  native-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install native tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick tesseract-ocr tesseract-ocr-eng fonts-dejavu-core
      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,similarity]"
          python -m pip install Pillow
      - name: Run native smoke test
        run: PYTHON=python scripts/run_native_smoke.sh /tmp/burnsub-native-smoke
      - name: Run end-to-end regression pipeline test
        run: pytest -q tests/test_regression_pipeline.py
